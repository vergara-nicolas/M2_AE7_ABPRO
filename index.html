<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AutoFix</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script defer src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script defer src="script.js"></script>
</head>
<body>
  <div class="container py-4">
    <header class="text-center mb-4">
      <h1 class="h3">AutoFix</h1>
      <p class="text-muted mb-0">Selecciona un servicio, completa el formulario y guarda la solicitud (pago simulado).</p>
    </header>

    <div class="row g-3">
      <!-- Formulario simple -->
      <section class="col-md-6">
        <div class="card">
          <div class="card-body">
            <h2 class="h5 mb-3">Formulario</h2>

            <form id="formSolicitud">
              <div class="mb-2">
                <label class="form-label" for="nombre">Nombre</label>
                <input id="nombre" class="form-control" placeholder="" required>
              </div>

              <div class="mb-2">
                <label class="form-label" for="servicio">Servicio</label>
                <select id="servicio" class="form-select" required>
                  <option value="">Selecciona un servicio…</option>
                </select>
              </div>

              <div class="mb-2">
                <label class="form-label">Precio</label>
                <div class="form-control" id="precio" style="background:#f8f9fa">—</div>
              </div>

              <div class="mb-2">
                <label class="form-label" for="descripcion">Descripción</label>
                <textarea id="descripcion" class="form-control" rows="3" placeholder="Ej: ruidos al frenar…" required></textarea>
              </div>

              <div class="mb-2">
                <label class="form-label" for="fecha">Fecha y hora</label>
                <input type="datetime-local" id="fecha" class="form-control" required>
              </div>

              <hr class="my-3">

              <h3 class="h6 mb-2">Pago (simulado)</h3>
              <div class="mb-2">
                <label class="form-label" for="tarjeta">N° tarjeta</label>
                <input id="tarjeta" class="form-control" placeholder="4111 1111 1111 1111" required>
              </div>
              <div class="row g-2 mb-2">
                <div class="col-7">
                  <label class="form-label" for="titular">Titular</label>
                  <input id="titular" class="form-control" required>
                </div>
                <div class="col-5">
                  <label class="form-label" for="cvv">CVV</label>
                  <input id="cvv" class="form-control" placeholder="123" required>
                </div>
              </div>

              <div class="d-grid d-sm-flex gap-2 mt-3">
                <button type="submit" class="btn btn-success">Guardar</button>
                <button type="reset" class="btn btn-outline-secondary">Limpiar</button>
                <button id="btnLimpiarTabla" type="button" class="btn btn-outline-danger">Limpiar tabla</button>
              </div>

              <div id="mensaje" class="alert alert-info mt-3 d-none"></div>
            </form>
          </div>
        </div>
      </section>

      <section class="col-md-6">
        <div class="card">
          <div class="card-body">
            <h2 class="h5 mb-3">Solicitudes (sesión actual)</h2>

            <div class="table-responsive">
              <table class="table table-sm table-striped align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th>Cliente</th>
                    <th>Servicio</th>
                    <th>Fecha</th>
                    <th>Total</th>
                    <th>Pago</th>
                  </tr>
                </thead>
                <tbody id="cuerpoTabla">
                </tbody>
              </table>
            </div>

          </div>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
